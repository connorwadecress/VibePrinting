services:
  vibeprinting:
    container_name: vibeprinting
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    # Load VP_USER_* and VP_MAX_CONCURRENT_JOBS from the root .env file.
    # All engine/platform API keys (Anthropic, Pexels, YouTube, TikTok, etc.)
    # live in brands/<id>/.env and are picked up at pipeline runtime — they
    # do not need to be in the environment here.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-America/Los_Angeles}
      - SECURE_COOKIE=${SECURE_COOKIE:-false}
      - VP_MAX_CONCURRENT_JOBS=${VP_MAX_CONCURRENT_JOBS:-1}
    volumes:
      - ./brands:/app/brands
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
      # Cross-brand shared asset library (gameplay clips + music). Both
      # buddies on the instance read from the same pool; per-brand
      # customization happens via the AssetEntry[] allowlists in
      # each channel.json. Managed via the admin UI's /library page.
      - ./shared:/app/shared
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
