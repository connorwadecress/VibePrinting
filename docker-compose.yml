# Snippet to merge into the Hostinger n8n docker-compose. Defines a
# single `vibeprinting` service that runs the admin UI + the embedded
# scheduler and deletion worker.
#
# Bind mounts:
#   ./brands -> /app/brands   per-brand config + credentials
#   ./output -> /app/output   pipeline run dirs (auto-cleaned)
#   ./data   -> /app/data     deletion queue + jobs.json + schedules.json
#   ./logs   -> /app/logs     upload-log.jsonl
#
# The service binds to 127.0.0.1 only — the existing reverse proxy
# fronts it as a vhost on the shared `n8n-net` network.

services:
  vibeprinting:
    container_name: vibeprinting
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=America/Los_Angeles
      # Required: shared admin token for the UI login form.
      - ADMIN_TOKEN=${VP_ADMIN_TOKEN}
      # Engine API keys (passed through from host .env)
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # Concurrency caps — the job manager already enforces 1/brand;
      # these env vars are read by future hardening steps.
      - VP_MAX_CONCURRENT=1
      - VP_MAX_CONCURRENT_PER_BRAND=1
    volumes:
      - ./brands:/app/brands
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# This network is created by the existing n8n compose file; declare
# it `external: true` so docker-compose attaches rather than creating
# a new isolated network.
networks:
  n8n-net:
    external: true
